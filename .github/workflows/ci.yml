name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    name: Build & Test (.NET 8)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore MemoryGame.sln

      - name: Build
        run: dotnet build MemoryGame.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test MemoryGame.Tests/MemoryGame.Tests.csproj --no-build --configuration Release --verbosity normal
